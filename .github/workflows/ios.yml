name: Build IPA

on:
  workflow_call:

jobs:
  build_ipa:
    runs-on: macos-26
    timeout-minutes: 60
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Restore Cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/node_modules
          key: ${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install --frozen-lockfile --prefer-offline

      - name: Download EAS CLI
        run: |
          mkdir -p eas-cli
          gh release download --repo linrongda/eas-cli --pattern eas-cli.tar.gz --dir eas-cli
          tar -xzf eas-cli/eas-cli.tar.gz -C eas-cli
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Compute and Inject buildNumber
        run: |
          chmod +x scripts/inject-buildnumber.sh
          ./scripts/inject-buildnumber.sh

      - name: EAS Build iOS
        run: |
          node ./eas-cli/eas/bin/run build --platform ios --profile production --non-interactive --local --output=./build/fzuhelper.ipa
        env:
          EAS_SKIP_AUTO_FINGERPRINT: 1

      - name: Generate Changelog
        id: changelog
        run: |
          GIT_LOG=$(git log -n 3 --pretty=format:"%s" | awk '{print NR ". " $0}') || { echo "Failed to get git log"; exit 1; }
          {
            echo "CHANGELOG<<BSEOF"
            echo -e "同步自 GitHub 最近三条提交记录:\n$GIT_LOG"
            echo "BSEOF"
          } >> "$GITHUB_OUTPUT"

      - name: EAS Submit iOS
        run: |
          node ./eas-cli/eas/bin/run submit --platform ios --profile production --non-interactive --local --path=./build/fzuhelper.ipa --what-to-test="${{ steps.changelog.outputs.CHANGELOG }}" \
          --fastlane-args="--distribute_external --reject_build_waiting_for_review"
